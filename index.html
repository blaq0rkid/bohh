
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Black Orchid Honor House - Empowering Lives, Building Stronger Communities. 501(c)(3) nonprofit providing dignity-based community support.">
  <meta name="keywords" content="nonprofit, community support, empowerment, housing assistance, volunteer opportunities">
  <meta name="author" content="Black Orchid Honor House">
  
  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="https://cdn.marblism.com/qhtATmSP9XW.webp">
  
  <!-- Open Graph / Social Media Meta Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Black Orchid Honor House - Empowering Lives, Building Stronger Communities">
  <meta property="og:description" content="Dignity-based community support and lasting positive change through comprehensive programs and resources.">
  <meta property="og:image" content="https://cdn.marblism.com/GHhtLTgO3L4.webp">
  <meta property="og:url" content="https://bohh.org">
  
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Black Orchid Honor House">
  <meta name="twitter:description" content="Empowering Lives, Building Stronger Communities">
  <meta name="twitter:image" content="https://cdn.marblism.com/GHhtLTgO3L4.webp">
  
  <title>Black Orchid Honor House | Empowering Lives, Building Stronger Communities</title>
  
  <!-- Netlify Forms - Static HTML forms for detection -->
  <form name="contact" netlify netlify-honeypot="bot-field" action="/thank-you.html" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="subject" />
    <textarea name="message"></textarea>
    <input type="checkbox" name="privacy" />
  </form>
  
  <form name="volunteer" netlify netlify-honeypot="bot-field" action="/thank-you.html" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <textarea name="skills"></textarea>
    <select name="availability">
      <option value="weekly">Weekly</option>
      <option value="monthly">Monthly</option>
      <option value="occasional">Occasional</option>
    </select>
    <select name="interest">
      <option value="community-support">Community Support</option>
      <option value="mentorship">Mentorship</option>
      <option value="events">Event Planning</option>
      <option value="administration">Administrative Support</option>
      <option value="other">Other</option>
    </select>
    <input type="checkbox" name="privacy" />
  </form>
  
  <style>
    /* Accessibility and smooth scrolling */
    html {
      scroll-behavior: smooth;
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Loading spinner */
    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1f2937;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #9333ea;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Skip to main content link for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #9333ea;
      color: white;
      padding: 8px;
      text-decoration: none;
      z-index: 100;
    }
    
    .skip-link:focus {
      top: 0;
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this application.</noscript>
  
  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <!-- Loading spinner shown while React loads -->
  <div id="root">
    <div class="loading-spinner">
      <div class="spinner"></div>
    </div>
  </div>
  
  <!-- Main content anchor for skip link -->
  <div id="main-content"></div>
  
  <!-- Success message display for form submissions -->
  <script>
    // Display success message if redirected from Netlify form submission
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('success') === 'true') {
      setTimeout(() => {
        alert('Thank you for your submission! We will get back to you soon.');
      }, 500);
    }
  </script>
  
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
